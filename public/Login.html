<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>


  <div class="wrapper-login" id="login-page">
    <div class="form-box login">
      <h2>Login</h2>
      <form action="#">
        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" required>
          <label>Email</label>
        </div>
        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" required>
          <label>Password</label>
        </div>
        <div class="remember-forgot">
          <label><input type="checkbox">Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>
        <div class="sign-in-with">
          <button type="submit" class="btn" id="btn-one">Login</button>
          <div class="decoration">
            <div class="decoration-line"></div> OR<div class="decoration-line"></div>
          </div>
          <div class="sign-ins">
            <button class="facebook-btn"> <img src="./icons/icons8-facebook-20.png" alt="Facebook">Sign in with Facebook</button>
            <button class="google-btn"> <img src="./icons/icons8-google-20.png" alt="Google">Sign in with Google</button>
          </div>
        </div>
        <div class="login-register">
          <p>Don't have an account?<a href="#" id="register-link">Register</a></p>
        </div>
      </form>
    </div>
  </div>

<!-- -------------------------Register----------------------------------->

<div class="wrapper-Register" id="register-page">
  <div class="form-box login">
    <h2>Register</h2>
    <form action="#">
      <div class="login-register">
        <div class="input-box">
          <span class="icon"><ion-icon name="person"></ion-icon></span>
          <input type="text" required>
          <label>First Name</label>
        </div>
        <div class="input-box">
          <span class="icon"><ion-icon name="person"></ion-icon></span>
          <input type="text" required>
          <label>Last Name</label>
        </div>
      </div>
      <div class="input-box">
        <span class="icon"><ion-icon name="mail"></ion-icon></span>
        <input type="email" required>
        <label>Email</label>
      </div>
      <div class="input-box">
        <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
        <input type="password" required>
        <label>Password</label>
      </div>
      <div class="input-box">
        <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
        <input type="password" required>
        <label>Confirm Password</label>
      </div>
      <div class="sign-in-with">
        <button type="submit" class="btn">Login</button>
        <div class="decoration">
          <div class="decoration-line"></div> OR<div class="decoration-line"></div>
        </div>
        <div class="sign-ins">
          <button class="facebook-btn"> <img src="./icons/icons8-facebook-20.png" alt="Facebook">Sign in with Facebook</button>
          <button class="google-btn"> <img src="./icons/icons8-google-20.png" alt="Google">Sign in with Google</button>
        </div>
      </div>
      <div class="login-register">
        <p>Already have an account?<a href="#" id="signin-link">Sign In</a></p>
      </div>
    </form>
  </div>
</div>


  <script src="./script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
